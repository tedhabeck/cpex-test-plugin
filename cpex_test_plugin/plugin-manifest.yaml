description: "A skeleton test plugin"
kind: "isolated_venv"
author: "habeck"
version: "0.1.9"
tags: ["plugin"]
conditions:
  # Apply to specific tools/servers
  - server_ids: []  # Apply to all servers
    tenant_ids: []  # Apply to all tenants
available_hooks:
  - "prompt_pre_fetch"
  - "prompt_post_fetch"
  - "tool_pre_invoke"
  - "tool_post_invoke"
default_config:
    class_name: "cpex_test_plugin.plugin.TestPlugin"
    requirements_file: "requirements.txt"
